<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌预览 - 高精度还原版</title>
    <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kreon', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #0d1321 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255, 215, 0, 0.25);
        }
        .header h1 {
            color: #ffd700;
            font-size: 1.75rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .nav-links a {
            color: #e8d6a7;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #ffd700;
        }

        /* Controls Section */
        .controls {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .control-group label { color: #ffd700; font-weight: 600; font-size: 0.875rem; }
        .control-group select, .control-group input {
            padding: 0.65rem 1rem;
            border: 2px solid rgba(255,215,0,0.25);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            color: #e8d6a7;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .control-group select:focus, .control-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }
        .control-group option { background: #1a1a2e; }
        .upload-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,215,0,0.15);
        }
        .upload-zone {
            border: 3px dashed rgba(255,215,0,0.35);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.25);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        .upload-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .upload-zone p { color: #c4b48f; }

        /* Card Preview Section */
        .preview-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            align-items: start;
        }
        .card-display {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(ellipse at center, rgba(29,45,68,0.5) 0%, transparent 70%);
            border-radius: 16px;
        }

        /* Game Card - Precise 300x422 reproduction */
        .game-card {
            position: relative;
            width: 300px;
            height: 422px;
            transform: scale(1.1);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8));
        }

        /* Shadow */
        .card-shadow {
            position: absolute;
            width: 300px;
            height: 422px;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.15) 100%);
            border-radius: 12px;
            transform: translate(10px, 12px);
            z-index: 0;
        }

        /* Card Frame (by type) */
        .card-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            z-index: 1;
        }
        .frame-attack {
            background: linear-gradient(180deg, #5a1515 0%, #3a0d0d 50%, #2a0909 100%);
            border: 3px solid #b32424;
            box-shadow: inset 0 0 30px rgba(179, 36, 36, 0.3), 0 0 15px rgba(179, 36, 36, 0.2);
        }
        .frame-skill {
            background: linear-gradient(180deg, #152a5a 0%, #0d1a3a 50%, #09122a 100%);
            border: 3px solid #245ab3;
            box-shadow: inset 0 0 30px rgba(36, 90, 179, 0.3), 0 0 15px rgba(36, 90, 179, 0.2);
        }
        .frame-power {
            background: linear-gradient(180deg, #155a2a 0%, #0d3a1a 50%, #092a12 100%);
            border: 3px solid #24b35a;
            box-shadow: inset 0 0 30px rgba(36, 179, 90, 0.3), 0 0 15px rgba(36, 179, 90, 0.2);
        }
        .frame-ancient {
            background: linear-gradient(180deg, #5a4a15 0%, #3a300d 50%, #2a2209 100%);
            border: 3px solid #ffd700;
            box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.3), 0 0 25px rgba(255, 215, 0, 0.4);
            animation: ancient-glow 2s ease-in-out infinite alternate;
        }
        @keyframes ancient-glow {
            0% { box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.3), 0 0 25px rgba(255, 215, 0, 0.4); }
            100% { box-shadow: inset 0 0 50px rgba(255, 215, 0, 0.5), 0 0 35px rgba(255, 215, 0, 0.6); }
        }

        /* Portrait Area (250x190) */
        .portrait-container {
            position: absolute;
            top: 43px;
            left: 25px;
            width: 250px;
            height: 190px;
            background: linear-gradient(180deg, #1a2a3a 0%, #0f1824 100%);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portrait-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .portrait-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a6a7a;
            font-size: 0.75rem;
            text-align: center;
            padding: 1rem;
        }

        /* Portrait Border */
        .portrait-border {
            position: absolute;
            top: 39px;
            left: 21px;
            width: 258px;
            height: 198px;
            border: 3px solid rgba(0,0,0,0.5);
            border-radius: 8px;
            pointer-events: none;
        }
        .frame-attack .portrait-border { border-color: rgba(179, 36, 36, 0.6); }
        .frame-skill .portrait-border { border-color: rgba(36, 90, 179, 0.6); }
        .frame-power .portrait-border { border-color: rgba(36, 179, 90, 0.6); }
        .frame-ancient .portrait-border { border-color: rgba(255, 215, 0, 0.7); }

        /* Title Banner */
        .title-banner {
            position: absolute;
            top: 231px;
            left: -13px;
            width: 327px;
            height: 83px;
            background: linear-gradient(180deg, rgba(40,35,30,0.95) 0%, rgba(25,22,18,0.98) 100%);
            border-top: 3px solid rgba(255,215,0,0.3);
            border-bottom: 3px solid rgba(255,215,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .title-label {
            font-family: 'Kreon', serif;
            font-size: 26px;
            font-weight: 700;
            color: #fff6e6;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* Ancient Fire Effect */
        .ancient-fire {
            position: absolute;
            top: 234px;
            right: 20px;
            width: 70px;
            height: 70px;
            display: none;
            animation: flame-flicker 0.4s ease-in-out infinite alternate;
        }
        .frame-ancient .ancient-fire { display: block; }
        @keyframes flame-flicker {
            0% { transform: scale(0.95) rotate(-2deg); opacity: 0.9; }
            100% { transform: scale(1.05) rotate(2deg); opacity: 1; }
        }
        .ancient-flame {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,150,0,0.8) 0%, rgba(255,100,0,0.6) 40%, rgba(255,50,0,0.2) 70%, transparent 100%);
            border-radius: 50% 50% 45% 45%;
        }

        /* Type Plaque */
        .type-plaque {
            position: absolute;
            top: 312px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 61px;
            padding: 6px 14px;
            background: linear-gradient(180deg, #5a5040 0%, #3a3228 100%);
            border: 2px solid #7a7060;
            border-radius: 4px;
            text-align: center;
        }
        .type-label {
            font-family: 'Kreon', serif;
            font-size: 16px;
            font-weight: 700;
            color: #0f1012;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .frame-ancient .type-plaque {
            background: linear-gradient(180deg, #e6c864 0%, #c4a030 100%);
            border-color: #f0d050;
        }

        /* Description Area */
        .description-container {
            position: absolute;
            top: 348px;
            left: 28px;
            width: 244px;
            height: 136px;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
        }
        .description-text {
            font-family: 'Kreon', serif;
            font-size: 16px;
            line-height: 1.35;
            color: #fff6e6;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* Energy Icon */
        .energy-icon {
            position: absolute;
            top: -16px;
            left: -16px;
            width: 64px;
            height: 64px;
            background: radial-gradient(ellipse at center, #c0a040 0%, #806020 100%);
            border: 3px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            box-shadow: inset 0 0 20px rgba(255,215,0,0.4), 0 4px 8px rgba(0,0,0,0.4);
        }
        .energy-label {
            font-family: 'Kreon', serif;
            font-size: 32px;
            font-weight: 700;
            color: #0f2010;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
        }

        /* Ancient Border Overlay */
        .ancient-border-overlay {
            position: absolute;
            top: -12px;
            left: -12px;
            width: 324px;
            height: 446px;
            border: 4px solid rgba(255, 215, 0, 0.8);
            border-radius: 16px;
            pointer-events: none;
            display: none;
        }
        .frame-ancient .ancient-border-overlay { display: block; }

        /* Card Info Panel */
        .card-info {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .card-info h3 { color: #ffd700; margin-bottom: 1rem; }
        .info-grid {
            display: grid;
            gap: 0.75rem;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }
        .info-label { color: #8a7a5a; }
        .info-value { color: #e8d6a7; font-weight: 600; }

        /* Cards List Section */
        .cards-list-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid rgba(255,215,0,0.25);
        }
        .cards-list-section h2 {
            color: #ffd700;
            margin-bottom: 1.5rem;
        }
        .mini-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .mini-card {
            position: relative;
            width: 100%;
            aspect-ratio: 300/422;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .mini-card:hover {
            transform: translateY(-8px) scale(1.05);
        }
        .mini-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
        }
        .mini-card-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
        .mini-frame-attack {
            background: linear-gradient(180deg, #5a1515 0%, #2a0909 100%);
            border: 2px solid #b32424;
        }
        .mini-frame-skill {
            background: linear-gradient(180deg, #152a5a 0%, #09122a 100%);
            border: 2px solid #245ab3;
        }
        .mini-frame-power {
            background: linear-gradient(180deg, #155a2a 0%, #092a12 100%);
            border: 2px solid #24b35a;
        }
        .mini-frame-ancient {
            background: linear-gradient(180deg, #5a4a15 0%, #2a2209 100%);
            border: 2px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }
        .mini-portrait {
            position: absolute;
            top: 12%;
            left: 8%;
            width: 84%;
            height: 45%;
            background: rgba(0,0,0,0.4);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .mini-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mini-title {
            position: absolute;
            bottom: 22%;
            left: 0;
            right: 0;
            text-align: center;
            color: #fff6e6;
            font-family: 'Kreon', serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .mini-cost {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 36px;
            height: 36px;
            background: radial-gradient(ellipse at center, #c0a040 0%, #806020 100%);
            border: 2px solid #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Kreon', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #0f2010;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 卡牌预览 - 高精度还原版</h1>
            <div class="nav-links">
                <a href="index.html">发布助手</a>
                <a href="preview.html">卡牌预览</a>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="controls-grid">
                <div class="control-group">
                    <label>选择卡牌</label>
                    <select id="cardSelect" onchange="updateCardFromSelect()">
                        <option value="">-- 从以下卡牌中选择 --</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>卡型</label>
                    <select id="cardTypeSelect" onchange="updateCardStyle()">
                        <option value="attack">攻击 (Attack)</option>
                        <option value="skill">技能 (Skill)</option>
                        <option value="power">能力 (Power)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>费用</label>
                    <input type="text" id="cardCostInput" value="3" oninput="updateEnergyLabel()">
                </div>
                <div class="control-group">
                    <label>稀有度</label>
                    <select id="cardRaritySelect" onchange="updateCardStyle()">
                        <option value="common">普通 (Common)</option>
                        <option value="uncommon">优秀 (Uncommon)</option>
                        <option value="rare">稀有 (Rare)</option>
                        <option value="ancient">先古 (Ancient)</option>
                    </select>
                </div>
            </div>

            <div class="upload-section">
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">🖼️</div>
                    <p><strong>点击或拖放上传卡图</strong></p>
                    <p style="color: #8a7a5a; font-size: 0.75rem;">推荐分辨率: 1000x760（普通）/ 606x852（先古）</p>
                    <input type="file" id="fileInput" accept=".png" style="display: none;" onchange="handleFileUpload(event)">
                </div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <div class="card-display">
                <div class="game-card" id="gameCard">
                    <div class="card-shadow"></div>

                    <div class="card-frame frame-attack" id="cardFrame">
                        <div class="portrait-container" id="portraitContainer">
                            <img class="portrait-image" id="portraitImage" src="" alt="Card Portrait" style="display: none;">
                            <div class="portrait-placeholder" id="portraitPlaceholder">上传卡图预览</div>
                        </div>
                        <div class="portrait-border"></div>

                        <div class="title-banner">
                            <div class="title-label" id="titleLabel">卡牌名称</div>
                        </div>

                        <div class="ancient-fire">
                            <div class="ancient-flame"></div>
                        </div>

                        <div class="type-plaque">
                            <div class="type-label" id="typeLabel">攻击</div>
                        </div>

                        <div class="description-container">
                            <div class="description-text" id="descriptionText">卡牌描述...</div>
                        </div>

                        <div class="energy-icon">
                            <div class="energy-label" id="energyLabel">3</div>
                        </div>

                        <div class="ancient-border-overlay"></div>
                    </div>
                </div>
            </div>

            <div class="card-info">
                <h3>卡牌信息</h3>
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-label">卡牌ID</span>
                        <span class="info-value" id="infoCardType">CardName</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">显示名称</span>
                        <span class="info-value" id="infoTitle">卡牌名称</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">类型</span>
                        <span class="info-value" id="infoType">攻击</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">稀有度</span>
                        <span class="info-value" id="infoRarity">普通</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">费用</span>
                        <span class="info-value" id="infoCost">3</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">卡图状态</span>
                        <span class="info-value" id="infoHasImage">❌ 无替换卡图</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cards List Section -->
        <div class="cards-list-section">
            <h2>📦 已替换卡牌库</h2>
            <div class="mini-cards-grid" id="miniCardsGrid"></div>
        </div>
    </div>

    <script>
        // Card Database with Localization (Chinese)
        const cardDatabase = [
            { id: "DefendRegent", title: "格挡", description: "获得5点格挡。", type: "skill", rarity: "starter", cost: 1, pool: "regent" },
            { id: "Venerate", title: "崇敬", description: "获得1点能量。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "FallingStar", title: "陨星", description: "造成20点伤害。虚无。", type: "attack", rarity: "rare", cost: 2, pool: "regent" },
            { id: "SovereignBlade", title: "君王之剑", description: "造成32点伤害。消耗。", type: "attack", rarity: "ancient", cost: 3, pool: "regent" },
            { id: "Charge", title: "冲锋", description: "造成6点伤害。获得2点格挡。", type: "attack", rarity: "common", cost: 1, pool: "regent" },
            { id: "ChildOfTheStars", title: "群星之子", description: "获得1点格挡。每当花费1星，额外获得等量格挡。", type: "power", rarity: "rare", cost: 2, pool: "regent" },
            { id: "CloakOfStars", title: "群星斗篷", description: "获得6点格挡。抽2张牌。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "Conqueror", title: "征服者", description: "造成14点伤害。如果是打出的第一张牌，伤害翻倍。", type: "attack", rarity: "rare", cost: 2, pool: "regent" },
            { id: "Convergence", title: "汇聚", description: "造成8点伤害。获得8点格挡。", type: "attack", rarity: "uncommon", cost: 2, pool: "regent" },
            { id: "CosmicIndifference", title: "宇宙冷漠", description: "对所有敌人造成9点伤害。所有敌人在本回合中失去9点力量。", type: "attack", rarity: "rare", cost: 2, pool: "regent" },
            { id: "DecisionsDecisions", title: "抉择，抉择", description: "抽3张牌。选择你手牌中的一张技能牌，将其打出3次。消耗。", type: "skill", rarity: "uncommon", cost: 0, pool: "regent" },
            { id: "Glow", title: "发光", description: "获得3点格挡。获得1点能量。", type: "skill", rarity: "common", cost: 0, pool: "regent" },
            { id: "HeavenlyDrill", title: "天降钻", description: "造成5点伤害。在你的回合结束时，如果这张牌位于抽牌堆顶部，将其打出。消耗。", type: "attack", rarity: "rare", cost: 3, pool: "regent" },
            { id: "KinglyKick", title: "王踢", description: "造成8点伤害。使敌人虚弱1回合。", type: "attack", rarity: "common", cost: 1, pool: "regent" },
            { id: "KinglyPunch", title: "王拳", description: "造成9点伤害。", type: "attack", rarity: "common", cost: 1, pool: "regent" },
            { id: "MakeItSo", title: "使其成真", description: "下一张打出的攻击牌伤害翻倍。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "MonarchsGaze", title: "君王凝视", description: "敌方意图变为攻击。获得4点格挡。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "NeutronAegis", title: "中子护盾", description: "获得12点格挡。获得1层金属化。", type: "skill", rarity: "rare", cost: 2, pool: "regent" },
            { id: "Patter", title: "喋喋不休", description: "抽1张牌。获得1点能量。", type: "skill", rarity: "common", cost: 0, pool: "regent" },
            { id: "Parry", title: "格挡", description: "获得5点格挡。", type: "skill", rarity: "starter", cost: 1, pool: "regent" },
            { id: "Prophesize", title: "预言", description: "抽2张牌。看3张牌。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "Quasar", title: "类星体", description: "造成6点伤害3次。", type: "attack", rarity: "rare", cost: 3, pool: "regent" },
            { id: "Radiate", title: "辐射", description: "造成6点伤害。对其他敌人造成4点伤害。", type: "attack", rarity: "uncommon", cost: 2, pool: "regent" },
            { id: "RefineBlade", title: "精炼之剑", description: "获得1点力量。获得1点敏捷。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "SwordSage", title: "剑之贤者", description: "攻击造成的伤害增加40%。", type: "power", rarity: "rare", cost: 3, pool: "regent" },
            { id: "TheSmith", title: "铁匠", description: "升级手牌中一张牌。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "Tyranny", title: "暴政", description: "在你的回合开始时，抽一张牌，并从你的手牌中消耗一张牌。", type: "power", rarity: "rare", cost: 3, pool: "regent" },
            { id: "VoidForm", title: "虚空形态", description: "每打出一张攻击牌，获得1点力量。每打出一张技能牌，获得1点敏捷。", type: "power", rarity: "rare", cost: 3, pool: "regent" },
            { id: "WroughtInWar", title: "锻造于战争", description: "获得2点力量。获得2点敏捷。", type: "skill", rarity: "uncommon", cost: 1, pool: "regent" },
            { id: "Arsenal", title: "武器库", description: "将三张攻击牌加入你的手牌。消耗。", type: "skill", rarity: "rare", cost: 1, pool: "regent" },
            { id: "BeatIntoShape", title: "锻打成型", description: "造成伤害。铸造。", type: "attack", rarity: "common", cost: 2, pool: "regent" },
            { id: "BigBang", title: "大爆炸", description: "抽3张牌。获得1点能量。获得星。铸造。消耗。", type: "skill", rarity: "rare", cost: 1, pool: "regent" },
            { id: "BundleOfJoy", title: "新生之喜", description: "将3张随机无色牌加入你的手牌。消耗。", type: "skill", rarity: "uncommon", cost: 0, pool: "regent" },
            { id: "CelestialMight", title: "天穹之力", description: "获得力量。获得敏捷。", type: "power", rarity: "rare", cost: 2, pool: "regent" },
            { id: "GatherLight", title: "聚集光芒", description: "获得4点格挡。抽1张牌。", type: "skill", rarity: "starter", cost: 1, pool: "regent" },
            { id: "KnockoutBlow", title: "击倒一击", description: "造成20点伤害。如果敌人意图攻击，伤害翻倍。", type: "attack", rarity: "uncommon", cost: 2, pool: "regent" },
            { id: "ManifestAuthority", title: "彰显权威", description: "获得3点力量。获得3点敏捷。", type: "skill", rarity: "rare", cost: 1, pool: "regent" },
            { id: "RoyalGamble", title: "皇家豪赌", description: "抽4张牌。弃掉手牌中所有牌。", type: "skill", rarity: "uncommon", cost: 0, pool: "regent" },
            { id: "ShiningStrike", title: "闪耀打击", description: "造成12点伤害。获得3点格挡。", type: "attack", rarity: "uncommon", cost: 2, pool: "regent" },
            { id: "Terraforming", title: "地形改造", description: "获得2点能量。抽3张牌。消耗。", type: "skill", rarity: "rare", cost: 1, pool: "regent" },
        ];

        // Available replacement images
        const replacedCards = ["DefendRegent", "Venerate", "FallingStar", "SovereignBlade", "Charge", "ChildOfTheStars", "CloakOfStars", "Conqueror", "Convergence", "CosmicIndifference", "DecisionsDecisions", "Glow", "HeavenlyDrill", "KinglyKick", "KinglyPunch", "MakeItSo", "MonarchsGaze", "NeutronAegis", "Patter", "Parry", "Prophesize", "Quasar", "Radiate", "RefineBlade", "SwordSage", "TheSmith", "Tyranny", "VoidForm", "WroughtInWar", "Arsenal", "BeatIntoShape", "BigBang", "BundleOfJoy", "CelestialMight", "GatherLight", "KnockoutBlow", "ManifestAuthority", "RoyalGamble", "ShiningStrike", "Terraforming"];

        // Type labels in Chinese
        const typeLabels = {
            "attack": "攻击",
            "skill": "技能",
            "power": "能力"
        };

        // Rarity labels in Chinese
        const rarityLabels = {
            "starter": "初始",
            "common": "普通",
            "uncommon": "优秀",
            "rare": "稀有",
            "ancient": "先古"
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            populateCardSelect();
            renderMiniCards();
            setupDragDrop();
        });

        // Populate card select dropdown
        function populateCardSelect() {
            const select = document.getElementById('cardSelect');
            cardDatabase.forEach(card => {
                const option = document.createElement('option');
                option.value = card.id;
                const hasReplacement = replacedCards.includes(card.id) ? '✓' : '';
                option.textContent = `${hasReplacement} ${card.title} (${card.id})`;
                select.appendChild(option);
            });
        }

        // Update card from dropdown
        function updateCardFromSelect() {
            const select = document.getElementById('cardSelect');
            const cardId = select.value;
            if (!cardId) return;
            const card = cardDatabase.find(c => c.id === cardId);
            if (!card) return;

            // Update fields
            document.getElementById('cardTypeSelect').value = card.type;
            document.getElementById('cardCostInput').value = card.cost;
            document.getElementById('cardRaritySelect').value = card.rarity;
            document.getElementById('titleLabel').textContent = card.title;
            document.getElementById('descriptionText').textContent = card.description;

            // Update info panel
            updateInfoPanel(card);

            // Check if we have a replacement image
            if (replacedCards.includes(card.id)) {
                const imgPath = `images/regent/${card.id}.png`;
                const img = new Image();
                img.onload = () => {
                    document.getElementById('portraitImage').src = imgPath;
                    document.getElementById('portraitImage').style.display = 'block';
                    document.getElementById('portraitPlaceholder').style.display = 'none';
                };
                img.onerror = () => {
                    document.getElementById('portraitImage').style.display = 'none';
                    document.getElementById('portraitPlaceholder').style.display = 'flex';
                };
                img.src = imgPath;
            } else {
                document.getElementById('portraitImage').style.display = 'none';
                document.getElementById('portraitPlaceholder').style.display = 'flex';
            }

            updateCardStyle();
        }

        // Update card visual style
        function updateCardStyle() {
            const type = document.getElementById('cardTypeSelect').value;
            const rarity = document.getElementById('cardRaritySelect').value;

            const frame = document.getElementById('cardFrame');
            const typeLabel = document.getElementById('typeLabel');

            // Update frame class
            if (rarity === 'ancient') {
                frame.className = 'card-frame frame-ancient';
            } else {
                frame.className = `card-frame frame-${type}`;
            }

            // Update type label
            typeLabel.textContent = typeLabels[type];

            // Update energy label
            updateEnergyLabel();
        }

        // Update energy label
        function updateEnergyLabel() {
            const cost = document.getElementById('cardCostInput').value || '1';
            document.getElementById('energyLabel').textContent = cost;

            // Update info panel
            const cardId = document.getElementById('cardSelect').value;
            const card = cardDatabase.find(c => c.id === cardId);
            if (card) {
                updateInfoPanel({ ...card, cost: cost });
            } else {
                document.getElementById('infoCost').textContent = cost;
            }
        }

        // Update info panel
        function updateInfoPanel(card) {
            document.getElementById('infoCardType').textContent = card.id || '';
            document.getElementById('infoTitle').textContent = card.title || '';
            document.getElementById('infoType').textContent = typeLabels[card.type] || '';
            document.getElementById('infoRarity').textContent = rarityLabels[card.rarity] || '';
            document.getElementById('infoCost').textContent = card.cost || '';
            document.getElementById('infoHasImage').textContent = replacedCards.includes(card.id) ? '✓ 有替换卡图' : '❌ 无替换卡图';
        }

        // Handle file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.png')) {
                alert('请上传 PNG 格式的图片');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('portraitImage').src = e.target.result;
                document.getElementById('portraitImage').style.display = 'block';
                document.getElementById('portraitPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // Setup drag and drop
        function setupDragDrop() {
            const zone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');

            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('dragover');
            });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    fileInput.files = e.dataTransfer.files;
                    handleFileUpload({ target: fileInput });
                }
            });
        }

        // Render mini cards
        function renderMiniCards() {
            const grid = document.getElementById('miniCardsGrid');
            const regentCards = cardDatabase.filter(c => c.pool === 'regent');

            grid.innerHTML = regentCards.map(card => {
                const hasImage = replacedCards.includes(card.id);
                const frameClass = card.rarity === 'ancient' ? 'mini-frame-ancient' : `mini-frame-${card.type}`;

                return `
                    <div class="mini-card" onclick="selectMiniCard('${card.id}')">
                        <div class="mini-card-inner">
                            <div class="mini-card-frame ${frameClass}">
                                <div class="mini-portrait">
                                    ${hasImage ? `<img src="images/regent/${card.id}.png" alt="${card.title}">` : `<span style="color: #5a6a7a; font-size: 0.65rem;">${card.id}</span>`}
                                </div>
                                <div class="mini-title">${card.title}</div>
                                <div class="mini-cost">${card.cost}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Select card from mini grid
        function selectMiniCard(cardId) {
            document.getElementById('cardSelect').value = cardId;
            updateCardFromSelect();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
