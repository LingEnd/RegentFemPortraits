<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegentFemPortraits - 卡牌预览</title>
    <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kreon', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1600px; margin: 0 auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }
        h1 { color: #ffd700; font-size: 2rem; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-links a:hover { background: rgba(255,255,255,0.2); }

        /* Upload Section */
        .upload-section {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 2px solid rgba(255,215,0,0.2);
        }
        .upload-section h2 { color: #ffd700; margin-bottom: 1rem; }
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .upload-box {
            border: 3px dashed rgba(255,215,0,0.5);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .upload-box:hover, .upload-box.dragover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        .upload-box input { display: none; }
        .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
        .upload-hint { color: #a0aec0; font-size: 0.875rem; }

        /* Controls */
        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .control-group label { color: #ffd700; font-weight: 600; }
        select, input[type="text"] {
            padding: 0.75rem 1rem;
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }
        select option { background: #1a1a2e; }

        /* Game-Style Card Container */
        .card-preview-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(ellipse at center, #1e3a5f 0%, #0a1628 100%);
            border-radius: 16px;
            min-height: 500px;
        }

        /* Game Card - Exact proportions from game */
        .game-card {
            position: relative;
            width: 300px;
            height: 422px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
        }

        /* Card Shadow */
        .card-shadow {
            position: absolute;
            width: 300px;
            height: 422px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 422"><filter id="shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="8"/><feOffset dx="0" dy="8" result="offsetblur"/><feFlood flood-color="rgba(0,0,0,0.5)"/><feComposite in2="offsetblur" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter><rect width="300" height="422" fill="%23666" filter="url(%23shadow)"/></svg>');
            opacity: 0.6;
        }

        /* Card Frame (different for each type) */
        .card-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .frame-attack {
            background: linear-gradient(180deg, #8b1a1a 0%, #5c1010 50%, #3d0a0a 100%);
            border: 4px solid #b22222;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(178,34,34,0.5), 0 0 15px rgba(178,34,34,0.3);
        }
        .frame-skill {
            background: linear-gradient(180deg, #1a3a8b 0%, #10285c 50%, #0a1a3d 100%);
            border: 4px solid #2244b2;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(34,68,178,0.5), 0 0 15px rgba(34,68,178,0.3);
        }
        .frame-power {
            background: linear-gradient(180deg, #1a8b3a 0%, #105c24 50%, #0a3d15 100%);
            border: 4px solid #22b244;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(34,178,68,0.5), 0 0 15px rgba(34,178,68,0.3);
        }
        .frame-ancient {
            background: linear-gradient(180deg, #8b6914 0%, #5c4510 50%, #3d2d0a 100%);
            border: 4px solid #ffd700;
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(255,215,0,0.4), 0 0 25px rgba(255,215,0,0.5);
            animation: ancientGlow 2s ease-in-out infinite;
        }
        @keyframes ancientGlow {
            0%, 100% { box-shadow: inset 0 0 30px rgba(255,215,0,0.4), 0 0 25px rgba(255,215,0,0.5); }
            50% { box-shadow: inset 0 0 40px rgba(255,215,0,0.6), 0 0 35px rgba(255,215,0,0.7); }
        }

        /* Card Inner Content */
        .card-inner {
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
        }

        /* Portrait Area */
        .portrait-container {
            position: absolute;
            top: 8px;
            left: 25px;
            width: 250px;
            height: 190px;
            border-radius: 4px;
            overflow: hidden;
            background: linear-gradient(180deg, #1e3a5f 0%, #0f2744 100%);
        }
        .portrait-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .portrait-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-size: 0.875rem;
            text-align: center;
            padding: 1rem;
        }

        /* Portrait Border */
        .portrait-border {
            position: absolute;
            top: 4px;
            left: 21px;
            width: 258px;
            height: 198px;
            border: 3px solid rgba(0,0,0,0.5);
            border-radius: 6px;
            pointer-events: none;
        }
        .frame-attack .portrait-border { border-color: rgba(178,34,34,0.6); }
        .frame-skill .portrait-border { border-color: rgba(34,68,178,0.6); }
        .frame-power .portrait-border { border-color: rgba(34,178,68,0.6); }
        .frame-ancient .portrait-border { border-color: rgba(255,215,0,0.6); }

        /* Title Banner */
        .title-banner {
            position: absolute;
            top: 200px;
            left: 14px;
            width: 272px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .title-text {
            font-family: 'Kreon', serif;
            font-size: 18px;
            font-weight: 700;
            color: #f7fafc;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: center;
            letter-spacing: 1px;
        }

        /* Type Plaque */
        .type-plaque {
            position: absolute;
            top: 245px;
            left: 115px;
            background: linear-gradient(180deg, #4a4a4a 0%, #2d2d2d 100%);
            border: 2px solid #666;
            border-radius: 4px;
            padding: 2px 12px;
        }
        .type-text {
            font-size: 12px;
            font-weight: 700;
            color: #f7fafc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .frame-attack .type-plaque { background: linear-gradient(180deg, #b22222 0%, #8b1a1a 100%); border-color: #cd5c5c; }
        .frame-skill .type-plaque { background: linear-gradient(180deg, #2244b2 0%, #1a3a8b 100%); border-color: #4169e1; }
        .frame-power .type-plaque { background: linear-gradient(180deg, #22b244 0%, #1a8b3a 100%); border-color: #3cb371; }
        .frame-ancient .type-plaque { background: linear-gradient(180deg, #ffd700 0%, #daa520 100%); border-color: #ffe135; }
        .frame-ancient .type-text { color: #1a1a1a; }

        /* Description Area */
        .description-area {
            position: absolute;
            top: 280px;
            left: 20px;
            width: 260px;
            height: 100px;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
            border-radius: 4px;
            padding: 8px;
            overflow: hidden;
        }
        .description-text {
            font-size: 13px;
            line-height: 1.4;
            color: #e2d9c0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Energy Cost */
        .energy-cost {
            position: absolute;
            top: -12px;
            left: -12px;
            width: 52px;
            height: 52px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"><circle cx="26" cy="26" r="24" fill="%231a1a2e" stroke="%23ffd700" stroke-width="3"/><circle cx="26" cy="26" r="20" fill="%23ffd700"/></svg>');
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .energy-text {
            font-family: 'Kreon', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.3);
        }

        /* Star/Upgrade indicator */
        .star-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
        }

        /* Ancient Flame Effect */
        .ancient-flames {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            display: none;
        }
        .frame-ancient .ancient-flames {
            display: block;
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.1) rotate(5deg); }
        }

        /* Card Grid */
        .card-grid-section { margin-top: 2rem; }
        .card-grid-section h2 { color: #ffd700; margin-bottom: 1rem; }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        /* Mini Card Preview */
        .mini-card {
            position: relative;
            width: 180px;
            height: 253px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .mini-card:hover {
            transform: translateY(-8px) scale(1.05);
            z-index: 10;
        }
        .mini-card .card-inner {
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
        }
        .mini-card .portrait-container {
            top: 4px;
            left: 15px;
            width: 150px;
            height: 114px;
        }
        .mini-card .title-banner {
            top: 120px;
            left: 8px;
            width: 164px;
            height: 24px;
        }
        .mini-card .title-text { font-size: 11px; }
        .mini-card .type-plaque {
            top: 147px;
            left: 69px;
            padding: 1px 8px;
        }
        .mini-card .type-text { font-size: 8px; }
        .mini-card .description-area {
            top: 168px;
            left: 12px;
            width: 156px;
            height: 60px;
            padding: 4px;
        }
        .mini-card .description-text { font-size: 8px; }
        .mini-card .energy-cost {
            width: 36px;
            height: 36px;
            top: -8px;
            left: -8px;
        }
        .mini-card .energy-text { font-size: 18px; }
        .mini-card .ancient-flames {
            width: 48px;
            height: 48px;
            top: -12px;
            right: -12px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 2rem;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🃏 卡牌预览</h1>
            <div class="nav-links">
                <a href="index.html">发布助手</a>
                <a href="preview.html">卡牌预览</a>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <h2>📤 上传卡图预览</h2>
            <div class="upload-grid">
                <div class="upload-box" id="normalUploadZone">
                    <div class="upload-icon">🖼️</div>
                    <p><strong>普通样式卡图</strong></p>
                    <p class="upload-hint">点击或拖放上传 PNG 图片<br>推荐分辨率: 1000×760</p>
                    <input type="file" id="normalFileInput" accept=".png,image/png">
                </div>
                <div class="upload-box" id="ancientUploadZone">
                    <div class="upload-icon">✨</div>
                    <p><strong>先古样式卡图</strong></p>
                    <p class="upload-hint">点击或拖放上传 PNG 图片<br>推荐分辨率: 606×852</p>
                    <input type="file" id="ancientFileInput" accept=".png,image/png">
                </div>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label>卡牌名称</label>
                    <input type="text" id="cardName" placeholder="如 SovereignBlade" value="SovereignBlade">
                </div>
                <div class="control-group">
                    <label>费用</label>
                    <input type="text" id="cardCost" placeholder="1" value="3">
                </div>
                <div class="control-group">
                    <label>类型</label>
                    <select id="cardType">
                        <option value="attack">攻击 (Attack)</option>
                        <option value="skill">技能 (Skill)</option>
                        <option value="power">能力 (Power)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>稀有度</label>
                    <select id="cardRarity">
                        <option value="common">普通 (Common)</option>
                        <option value="uncommon">优秀 (Uncommon)</option>
                        <option value="rare">稀有 (Rare)</option>
                        <option value="ancient">先古 (Ancient)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Preview -->
        <div class="card-preview-container">
            <div class="game-card" id="gameCard">
                <div class="card-frame frame-attack" id="cardFrame">
                    <div class="card-inner">
                        <div class="portrait-container" id="portraitContainer">
                            <img class="portrait-image" id="portraitImage" src="" alt="Card Portrait">
                            <div class="portrait-placeholder" id="portraitPlaceholder">上传卡图预览</div>
                        </div>
                        <div class="portrait-border"></div>
                        <div class="title-banner">
                            <span class="title-text" id="cardTitle">卡牌名称</span>
                        </div>
                        <div class="type-plaque">
                            <span class="type-text" id="typeText">攻击</span>
                        </div>
                        <div class="description-area">
                            <p class="description-text" id="cardDesc">造成6点伤害。</p>
                        </div>
                    </div>
                    <div class="energy-cost">
                        <span class="energy-text" id="energyText">1</span>
                    </div>
                    <div class="ancient-flames">
                        <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><circle cx='40' cy='40' r='35' fill='%23ffd700' opacity='0.8'/><circle cx='40' cy='40' r='25' fill='%23ff8c00' opacity='0.6'/><circle cx='40' cy='40' r='15' fill='%23ff4500' opacity='0.8'/></svg>" alt="Ancient Flames">
                    </div>
                </div>
            </div>
        </div>

        <!-- Existing Cards Grid -->
        <div class="card-grid-section">
            <h2>📁 已替换卡牌库</h2>
            <div class="filter-bar">
                <select id="filterType">
                    <option value="">所有类型</option>
                    <option value="attack">攻击</option>
                    <option value="skill">技能</option>
                    <option value="power">能力</option>
                </select>
                <select id="filterRarity">
                    <option value="">所有稀有度</option>
                    <option value="common">普通</option>
                    <option value="uncommon">优秀</option>
                    <option value="rare">稀有</option>
                    <option value="ancient">先古</option>
                </select>
                <input type="text" id="searchCard" placeholder="搜索卡牌名称...">
            </div>
            <div class="card-grid" id="cardGrid"></div>
        </div>
    </div>

    <!-- Modal for full preview -->
    <div class="modal" id="previewModal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="card-preview-container" style="background: transparent;">
            <div class="game-card" id="modalCard" style="transform: scale(1.5);">
                <!-- Same structure as preview card -->
            </div>
        </div>
    </div>

            { name: 'Charge', rarity: 'common', type: 'attack', cost: 1, title: '冲锋', desc: '造成6点伤害。获得2点格挡。' },
            { name: 'Glow', rarity: 'common', type: 'skill', cost: 0, title: '发光', desc: '获得3点格挡。获得1点能量。' },
            { name: 'DefendRegent', rarity: 'starter', type: 'skill', cost: 1, title: '格挡', desc: '获得5点格挡。' },
            { name: 'Parry', rarity: 'starter', type: 'skill', cost: 1, title: '格挡', desc: '获得5点格挡。' },
            { name: 'GatherLight', rarity: 'starter', type: 'skill', cost: 1, title: '聚集光芒', desc: '获得4点格挡。抽1张牌。' },
            { name: 'Patter', rarity: 'common', type: 'skill', cost: 0, title: '喋喋不休', desc: '抽1张牌。获得1点能量。' },
            { name: 'KinglyPunch', rarity: 'common', type: 'attack', cost: 1, title: '王拳', desc: '造成9点伤害。' },
            { name: 'KinglyKick', rarity: 'common', type: 'attack', cost: 1, title: '王踢', desc: '造成8点伤害。使敌人虚弱1回合。' },
            { name: 'ShiningStrike', rarity: 'uncommon', type: 'attack', cost: 2, title: '闪耀打击', desc: '造成12点伤害。获得3点格挡。' },
            { name: 'KnockoutBlow', rarity: 'uncommon', type: 'attack', cost: 2, title: '击倒一击', desc: '造成20点伤害。如果敌人意图攻击，则伤害翻倍。' },
            { name: 'Radiate', rarity: 'uncommon', type: 'attack', cost: 2, title: '辐射', desc: '造成6点伤害。对其他敌人造成4点伤害。' },
            { name: 'CloakOfStars', rarity: 'uncommon', type: 'skill', cost: 1, title: '星之斗篷', desc: '获得6点格挡。抽2张牌。' },
            { name: 'Conqueror', rarity: 'rare', type: 'attack', cost: 2, title: '征服者', desc: '造成14点伤害。如果这张牌是你打出的第一张牌，伤害翻倍。' },
            { name: 'Convergence', rarity: 'uncommon', type: 'attack', cost: 2, title: '汇聚', desc: '造成8点伤害。获得8点格挡。' },
            { name: 'DecisionsDecisions', rarity: 'uncommon', type: 'skill', cost: 0, title: '抉择，抉择', desc: '抽3张牌。选择你手牌中的一张技能牌，并将其打出3次。消耗。' },
            { name: 'MakeItSo', rarity: 'uncommon', type: 'skill', cost: 1, title: '使其成真', desc: '下一张打出的攻击牌伤害翻倍。' },
            { name: 'MonarchsGaze', rarity: 'uncommon', type: 'skill', cost: 1, title: '君王凝视', desc: '敌方意图变为攻击。获得4点格挡。' },
            { name: 'Prophesize', rarity: 'uncommon', type: 'skill', cost: 1, title: '预言', desc: '抽2张牌。看3张牌。' },
            { name: 'RefineBlade', rarity: 'uncommon', type: 'skill', cost: 1, title: '精炼之剑', desc: '获得1点力量。获得1点敏捷。' },
            { name: 'TheSmith', rarity: 'uncommon', type: 'skill', cost: 1, title: '铁匠', desc: '升级手牌中一张牌。' },
            { name: 'RoyalGamble', rarity: 'uncommon', type: 'skill', cost: 0, title: '皇家豪赌', desc: '抽4张牌。弃掉手牌中所有牌。' },
            { name: 'WroughtInWar', rarity: 'uncommon', type: 'skill', cost: 1, title: '锻造于战争', desc: '获得2点力量。获得2点敏捷。' },
            { name: 'Venerate', rarity: 'uncommon', type: 'skill', cost: 1, title: '崇敬', desc: '获得1点能量。' },
        ];

        let currentImageData = null;
        let currentAncientImageData = null;

        document.addEventListener('DOMContentLoaded', function() {
            setupUploadZone('normalUploadZone', 'normalFileInput', handleNormalUpload);
            setupUploadZone('ancientUploadZone', 'ancientFileInput', handleAncientUpload);
            setupControls();
            renderCardGrid();
            updatePreview();
        });

        function setupUploadZone(zoneId, inputId, handler) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);

            zone.addEventListener('click', () => input.click());
            zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) handler([e.dataTransfer.files[0]]);
            });
            input.addEventListener('change', () => {
                if (input.files.length > 0) handler([input.files[0]]);
            });
        }

        function handleNormalUpload(files) {
            if (files.length === 0 || !files[0].name.toLowerCase().endsWith('.png')) {
                alert('请上传 PNG 格式的图片');
                return;
            }
            const file = files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImageData = e.target.result;
                document.getElementById('portraitImage').src = currentImageData;
                document.getElementById('portraitImage').style.display = 'block';
                document.getElementById('portraitPlaceholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function handleAncientUpload(files) {
            if (files.length === 0 || !files[0].name.toLowerCase().endsWith('.png')) {
                alert('请上传 PNG 格式的图片');
                return;
            }
            const file = files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                currentAncientImageData = e.target.result;
                // For ancient cards, update the image if ancient is selected
                if (document.getElementById('cardRarity').value === 'ancient') {
                    document.getElementById('portraitImage').src = currentAncientImageData;
                }
            };
            reader.readAsDataURL(file);
        }

        function setupControls() {
            ['cardName', 'cardCost', 'cardType', 'cardRarity', 'cardDesc'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
                document.getElementById(id).addEventListener('change', updatePreview);
            });

            ['filterType', 'filterRarity', 'searchCard'].forEach(id => {
                document.getElementById(id).addEventListener('change', renderCardGrid);
                document.getElementById(id).addEventListener('input', renderCardGrid);
            });
        }

        function updatePreview() {
            const name = document.getElementById('cardName').value || '卡牌名称';
            const cost = document.getElementById('cardCost').value || '1';
            const type = document.getElementById('cardType').value;
            const rarity = document.getElementById('cardRarity').value;
            const desc = document.getElementById('cardDesc').value || '卡牌描述';

            document.getElementById('cardTitle').textContent = name;
            document.getElementById('energyText').textContent = cost;
            document.getElementById('cardDesc').textContent = desc;

            const typeMap = { attack: '攻击', skill: '技能', power: '能力' };
            document.getElementById('typeText').textContent = typeMap[type] || type;

            const frame = document.getElementById('cardFrame');
            frame.className = 'card-frame frame-' + type;
            if (rarity === 'ancient') {
                frame.className = 'card-frame frame-ancient';
            }

            // Use ancient image if available and ancient is selected
            if (rarity === 'ancient' && currentAncientImageData) {
                document.getElementById('portraitImage').src = currentAncientImageData;
            } else if (currentImageData) {
                document.getElementById('portraitImage').src = currentImageData;
            }
        }

        function renderCardGrid() {
            const grid = document.getElementById('cardGrid');
            const typeFilter = document.getElementById('filterType').value;
            const rarityFilter = document.getElementById('filterRarity').value;
            const searchFilter = document.getElementById('searchCard').value.toLowerCase();

            const filtered = cardDatabase.filter(card => {
                if (typeFilter && card.type !== typeFilter) return false;
                if (rarityFilter && card.rarity !== rarityFilter) return false;
                if (searchFilter && !card.name.toLowerCase().includes(searchFilter) && !card.title.toLowerCase().includes(searchFilter)) return false;
                return true;
            });

            grid.innerHTML = filtered.map(card => createMiniCard(card)).join('');
        }

        function createMiniCard(card) {
            const frameClass = 'frame-' + card.type;
            const imageUrl = `images/${card.name}.png`;

            return `
                <div class="mini-card ${card.rarity === 'ancient' ? 'frame-ancient' : frameClass}" onclick="showCardPreview('${card.name}')">
                    <div class="card-inner">
                        <div class="portrait-container">
                            <img class="portrait-image" src="${imageUrl}" alt="${card.title}"
                                 onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=portrait-placeholder>${card.name}</div>';">
                        </div>
                        <div class="portrait-border"></div>
                        <div class="title-banner">
                            <span class="title-text">${card.title}</span>
                        </div>
                        <div class="type-plaque">
                            <span class="type-text">${card.type === 'attack' ? '攻击' : card.type === 'skill' ? '技能' : '能力'}</span>
                        </div>
                        <div class="description-area">
                            <p class="description-text">${card.desc}</p>
                        </div>
                    </div>
                    <div class="energy-cost">
                        <span class="energy-text">${card.cost}</span>
                    </div>
                    ${card.rarity === 'ancient' ? '<div class="ancient-flames"><img src="data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 80 80\'><circle cx=\'40\' cy=\'40\' r=\'35\' fill=\'%23ffd700\' opacity=\'0.8\'/><circle cx=\'40\' cy=\'40\' r=\'25\' fill=\'%23ff8c00\' opacity=\'0.6\'/><circle cx=\'40\' cy=\'40\' r=\'15\' fill=\'%23ff4500\' opacity=\'0.8\'/></svg>" alt="Flames"></div>' : ''}
                </div>
            `;
        }

        function showCardPreview(cardName) {
            const card = cardDatabase.find(c => c.name === cardName);
            if (!card) return;

            document.getElementById('cardName').value = card.name;
            document.getElementById('cardCost').value = card.cost;
            document.getElementById('cardType').value = card.type;
            document.getElementById('cardRarity').value = card.rarity;
            document.getElementById('cardDesc').value = card.desc;

            // Load the image
            const img = new Image();
            img.onload = () => {
                currentImageData = img.src;
                updatePreview();
            };
            img.src = `images/${card.name}.png`;

            updatePreview();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeModal() {
            document.getElementById('previewModal').classList.remove('active');
        }
    </script>
</body>
</html>
