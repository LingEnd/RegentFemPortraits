<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RegentFemPortraits - 卡牌预览</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links {
            display: flex;
            gap: 1rem;
        }
        .nav-links a {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            background: rgba(255,255,255,0.2);
        }
        h1 { 
            color: #ffd700; 
            font-size: 2.5rem; 
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        .subtitle { color: #a0aec0; margin-top: 0.5rem; }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .filter-bar select, .filter-bar input {
            padding: 0.75rem 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            min-width: 150px;
        }
        .filter-bar select option { background: #1a1a2e; }
        .filter-bar input::placeholder { color: #6b7280; }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            padding: 1rem;
        }

        /* Game-Style Card */
        .game-card {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            transform-style: preserve-3d;
        }
        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            z-index: 10;
        }

        /* Card Border by Rarity */
        .card-common {
            box-shadow: 0 4px 20px rgba(156, 163, 175, 0.4),
                        inset 0 0 30px rgba(156, 163, 175, 0.1);
            border: 3px solid #9ca3af;
        }
        .card-uncommon {
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4),
                        inset 0 0 30px rgba(34, 197, 94, 0.1);
            border: 3px solid #22c55e;
        }
        .card-rare {
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4),
                        inset 0 0 30px rgba(59, 130, 246, 0.1);
            border: 3px solid #3b82f6;
        }
        .card-starter {
            box-shadow: 0 4px 20px rgba(107, 114, 128, 0.4),
                        inset 0 0 30px rgba(107, 114, 128, 0.1);
            border: 3px solid #6b7280;
            background: linear-gradient(145deg, #2d2d2d, #1f1f1f);
        }
        .card-ancient {
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.5),
                        inset 0 0 30px rgba(255, 215, 0, 0.2);
            border: 3px solid #ffd700;
            background: linear-gradient(145deg, #2a2a1a, #1a1a10);
        }

        /* Card Content */
        .card-inner {
            position: absolute;
            inset: 4px;
            background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
        }
        .card-cost {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .card-type {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .type-attack { background: #ef4444; color: white; }
        .type-skill { background: #3b82f6; color: white; }
        .type-power { background: #8b5cf6; color: white; }
        .type-energy { background: #eab308; color: #1a1a2e; }

        /* Card Portrait */
        .card-portrait {
            flex: 1;
            position: relative;
            background: linear-gradient(180deg, #1e3a5f 0%, #0f2744 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-portrait img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        .portrait-placeholder {
            width: 80%;
            height: 80%;
            background: linear-gradient(145deg, #2d3748, #1a202c);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-size: 10px;
            text-align: center;
            word-break: break-word;
            padding: 10px;
        }

        /* Card Title */
        .card-title {
            padding: 8px 10px;
            text-align: center;
            background: rgba(0,0,0,0.4);
        }
        .card-title-text {
            font-weight: bold;
            color: #f7fafc;
            font-size: 12px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Card Description */
        .card-desc {
            padding: 8px 10px;
            background: rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .card-desc-text {
            color: #a0aec0;
            font-size: 9px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Card Pool Badge */
        .card-pool-badge {
            position: absolute;
            top: -3px;
            right: -3px;
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 0 8px 0 8px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }
        .pool-regent { background: #8b5cf6; }
        .pool-ironclad { background: #ef4444; }
        .pool-silent { background: #22c55e; }
        .pool-defect { background: #3b82f6; }
        .pool-watcher { background: #ec4899; }

        /* Ancient Card Specific */
        .card-ancient .card-inner {
            background: linear-gradient(180deg, #2a2a1a 0%, #1a1a10 100%);
        }
        .card-ancient .card-portrait {
            background: linear-gradient(180deg, #4a4a2a 0%, #2a2a15 100%);
            border: 2px solid rgba(255,215,0,0.3);
            margin: 4px;
            border-radius: 4px;
        }

        /* Preview Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 2rem;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
        .modal-close:hover { background: rgba(255,255,255,0.2); }

        .preview-card-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .preview-card {
            width: 300px;
            aspect-ratio: 3/4;
        }

        .modal-info {
            color: #a0aec0;
            font-size: 14px;
        }
        .modal-info h3 { color: #f7fafc; margin-bottom: 0.5rem; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-label { color: #718096; }
        .info-value { color: #f7fafc; }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            color: #a0aec0;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 0.875rem; }
    </style>
</head>

            { name: 'DemonForm', pool: 'ironclad', rarity: 'rare', type: 'power', cost: 3, title: '恶魔形态', desc: '每回合开始获得2点力量。' },
            
            // 静默者卡牌
            { name: 'Strike_Silent', pool: 'silent', rarity: 'starter', type: 'attack', cost: 1, title: '打击', desc: '造成6点伤害。' },
            { name: 'Defend_Silent', pool: 'silent', rarity: 'starter', type: 'skill', cost: 1, title: '防御', desc: '获得5点格挡。' },
            { name: 'SneakAttack', pool: 'silent', rarity: 'common', type: 'attack', cost: 0, title: '偷袭', desc: '造成9点伤害。消耗。' },
            { name: 'Backstab', pool: 'silent', rarity: 'common', type: 'attack', cost: 0, title: '背刺', desc: '如果敌人没有格挡，造成12点伤害。消耗。' },
            { name: 'LethalPoison', pool: 'silent', rarity: 'rare', type: 'power', cost: 3, title: '致命毒药', desc: '毒素在回合开始时造成额外伤害。' },
            { name: 'Shuriken', pool: 'silent', rarity: 'uncommon', type: 'attack', cost: 1, title: '手里剑', desc: '造成4点伤害3次。' },
            { name: 'Caltrops', pool: 'silent', rarity: 'uncommon', type: 'skill', cost: 1, title: '铁蒺藜', desc: '使敌人流血3回合。每当敌人攻击，使其流血3回合。' },
            
            // 缺陷卡牌
            { name: 'Strike_Defect', pool: 'defect', rarity: 'starter', type: 'attack', cost: 1, title: '打击', desc: '造成6点伤害。' },
            { name: 'Defend_Defect', pool: 'defect', rarity: 'starter', type: 'skill', cost: 1, title: '防御', desc: '获得5点格挡。' },
            { name: 'Zap', pool: 'defect', rarity: 'common', type: 'attack', cost: 0, title: '电击', desc: '造成4点伤害。获得1点电荷。' },
            { name: 'StaticDischarge', pool: 'defect', rarity: 'rare', type: 'attack', cost: 1, title: '静电释放', desc: '造成10点伤害。如果有3点电荷，则翻倍。消耗。' },
            { name: 'Fusion', pool: 'defect', rarity: 'rare', type: 'skill', cost: 1, title: '融合', desc: '获得3点电荷。升级手牌中一张牌。' },
            
            // 守望者卡牌
            { name: 'Strike_Watcher', pool: 'watcher', rarity: 'starter', type: 'attack', cost: 1, title: '打击', desc: '造成6点伤害。' },
            { name: 'Defend_Watcher', pool: 'watcher', rarity: 'starter', type: 'skill', cost: 1, title: '防御', desc: '获得5点格挡。' },
            { name: 'Eruption', pool: 'watcher', rarity: 'common', type: 'attack', cost: 1, title: '爆发', desc: '造成8点伤害。' },
            { name: 'Judgment', pool: 'watcher', rarity: 'rare', type: 'attack', cost: 3, title: '审判', desc: '造成32点伤害。消耗。' },
            { name: 'Blossom', pool: 'watcher', rarity: 'uncommon', type: 'skill', cost: 1, title: '绽放', desc: '获得3点格挡。抽3张牌。' },
        ];

        // Load replacement data
        let replacedCards = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadReplacementData();
            renderCardGrid();
            setupEventListeners();
        });

        async function loadReplacementData() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/master/RegentFemPortraits/card_replacements.json`);
                const config = await response.json();
                replacedCards = [
                    ...config.normalReplacements.map(r => r.cardType),
                    ...config.ancientReplacements.map(r => r.cardType)
                ];
            } catch {
                replacedCards = [];
            }
            updateStats();
        }

        function renderCardGrid() {
            const grid = document.getElementById('cardGrid');
            const poolFilter = document.getElementById('filterPool').value;
            const rarityFilter = document.getElementById('filterRarity').value;
            const typeFilter = document.getElementById('filterType').value;
            const searchFilter = document.getElementById('searchCard').value.toLowerCase();

            const filteredCards = allCards.filter(card => {
                if (poolFilter && card.pool !== poolFilter) return false;
                if (rarityFilter && card.rarity !== rarityFilter) return false;
                if (typeFilter && card.type !== typeFilter) return false;
                if (searchFilter && !card.title.toLowerCase().includes(searchFilter) && 
                    !card.name.toLowerCase().includes(searchFilter)) return false;
                return true;
            });

            grid.innerHTML = filteredCards.map(card => createCardHTML(card)).join('');
            updateStats(filteredCards.length);
        }

        function createCardHTML(card) {
            const hasReplacement = replacedCards.includes(card.name);
            const hasImage = hasReplacement;
            
            return `
                <div class="game-card card-${card.rarity}" onclick="showPreview('${card.name}')">
                    <div class="card-inner">
                        <div class="card-header">
                            <div class="card-cost">${card.cost}</div>
                            <div class="card-type type-${card.type}">${getTypeLabel(card.type)}</div>
                        </div>
                        <div class="card-portrait">
                            ${hasImage ? 
                                `<img src="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/master/RegentFemPortraits/card_portraits/${card.pool}/${card.name}.png" 
                                   alt="${card.title}"
                                   onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'portrait-placeholder\'>${card.name}</div>';">` :
                                `<div class="portrait-placeholder">${card.name}</div>`
                            }
                        </div>
                        <div class="card-title">
                            <div class="card-title-text">${card.title}</div>
                        </div>
                        <div class="card-desc">
                            <div class="card-desc-text">${card.desc}</div>
                        </div>
                    </div>
                    <div class="card-pool-badge pool-${card.pool}">${getPoolLabel(card.pool)}</div>
                    ${hasReplacement ? `<div style="position:absolute;bottom:4px;left:4px;width:20px;height:20px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:bold;">✓</div>` : ''}
                </div>
            `;
        }

        function getTypeLabel(type) {
            const labels = { attack: '攻击', skill: '技能', power: '能力' };
            return labels[type] || type;
        }

        function getPoolLabel(pool) {
            const labels = { 
                regent: '储君', 
                ironclad: '铁甲', 
                silent: '静默', 
                defect: '缺陷', 
                watcher: '守望' 
            };
            return labels[pool] || pool;
        }

        function showPreview(cardName) {
            const card = allCards.find(c => c.name === cardName);
            if (!card) return;

            const modal = document.getElementById('previewModal');
            const container = document.getElementById('previewCardContainer');
            const info = document.getElementById('modalInfo');

            const hasReplacement = replacedCards.includes(cardName);
            
            container.innerHTML = `
                <div class="game-card preview-card card-${card.rarity}">
                    <div class="card-inner">
                        <div class="card-header">
                            <div class="card-cost">${card.cost}</div>
                            <div class="card-type type-${card.type}">${getTypeLabel(card.type)}</div>
                        </div>
                        <div class="card-portrait">
                            ${hasReplacement ? 
                                `<img src="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/master/RegentFemPortraits/card_portraits/${card.pool}/${card.name}.png" 
                                   alt="${card.title}"
                                   onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'portrait-placeholder\'>${card.name}</div>';">` :
                                `<div class="portrait-placeholder">${card.name}</div>`
                            }
                        </div>
                        <div class="card-title">
                            <div class="card-title-text">${card.title}</div>
                        </div>
                        <div class="card-desc">
                            <div class="card-desc-text">${card.desc}</div>
                        </div>
                    </div>
                    <div class="card-pool-badge pool-${card.pool}">${getPoolLabel(card.pool)}</div>
                </div>
            `;

            info.innerHTML = `
                <h3>卡牌信息</h3>
                <div class="info-row"><span class="info-label">名称</span><span class="info-value">${card.name}</span></div>
                <div class="info-row"><span class="info-label">显示名称</span><span class="info-value">${card.title}</span></div>
                <div class="info-row"><span class="info-label">卡池</span><span class="info-value">${getPoolLabel(card.pool)}</span></div>
                <div class="info-row"><span class="info-label">稀有度</span><span class="info-value">${getRarityLabel(card.rarity)}</span></div>
                <div class="info-row"><span class="info-label">类型</span><span class="info-value">${getTypeLabel(card.type)}</span></div>
                <div class="info-row"><span class="info-label">费用</span><span class="info-value">${card.cost}</span></div>
                <div class="info-row"><span class="info-label">已替换</span><span class="info-value">${hasReplacement ? '✓ 是' : '✗ 否'}</span></div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function getRarityLabel(rarity) {
            const labels = { 
                starter: '初始', 
                common: '普通', 
                uncommon: '优秀', 
                rare: '稀有', 
                ancient: '先古' 
            };
            return labels[rarity] || rarity;
        }

        function closeModal() {
            const modal = document.getElementById('previewModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function setupEventListeners() {
            ['filterPool', 'filterRarity', 'filterType', 'searchCard'].forEach(id => {
                document.getElementById(id).addEventListener('change', renderCardGrid);
                document.getElementById(id).addEventListener('input', renderCardGrid);
            });

            document.getElementById('previewModal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        }

        function updateStats(filteredCount = null) {
            document.getElementById('totalCards').textContent = allCards.length;
            document.getElementById('filteredCards').textContent = filteredCount ?? allCards.length;
            document.getElementById('replacedCards').textContent = replacedCards.length;
        }
    </script>
</body>
</html>
